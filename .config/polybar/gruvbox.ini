[colors]
; -------------------------
; Gruvbox Dark Palette
; -------------------------

; Backgrounds
background = #282828
background-alt = #3c3836

; Foregrounds
foreground = #ebdbb2
foreground-alt = #a89984

; Standard Colors
red = #cc241d
green = #98971a
yellow = #d79921
blue = #458588
purple = #b16286
aqua = #689d6a
orange = #d65d0e

; Bright / Alternate Colors
red-alt = #fb4934
green-alt = #b8bb26
yellow-alt = #fabd2f
blue-alt = #83a598
purple-alt = #d3869b
aqua-alt = #8ec07c
orange-alt = #fe8019

; Semantic variables (using Polybar's variable referencing)
; You can easily change your overall theme by swapping these assignments.
primary = ${self.yellow}
secondary = ${self.aqua}
alert = ${self.red-alt}
disabled = #928374
